name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover

      - name: Smoke test public CLI commands
        run: |
          metricdrive score
          metricdrive preferences
          metricdrive hard-negatives --epochs 10
          metricdrive vlm-examples --limit 2
          metricdrive rl-align --epochs 10
          metricdrive export-demo --output /tmp/metricdrive-demo --epochs 5
